<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e1e2f,#3a3a6a);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container {
  width:90%;
  max-width:600px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

input {
  padding:12px;
  width:70%;
  border-radius:10px;
  border:none;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6b81;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.tile {
  display:inline-block;
  padding:15px 18px;
  margin:6px;
  background:#ff6b81;
  border-radius:10px;
  cursor:grab;
  font-size:18px;
  user-select:none;
}

.zone {
  min-height:70px;
  border:2px dashed white;
  margin:20px 0;
  padding:10px;
  border-radius:10px;
}

#tiles {
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container" id="app">
  <h1>For You ❤️</h1>
  <p id="story"></p>

  <p id="q"></p>
  <input id="a">
  <br>
  <button onclick="check()">Continue</button>

  <p id="feedback"></p>
</div>

<script>
const puzzles = [
["We stayed even when it was hard. What is that called?","love","B"],
["A dance you love…","bachata","A"],
["A dance I love…","salsa","C"],
["Who do you trust when things are uncertain?","god","H"],
["Our future dog…","churro","A"],
["Your favorite hobby 😴","sleeping","T"],
["The pedagogy thinker you always mention","tulodziecki","U"]
];

let i=0;
let letters=[];

const storyText = [
"We weren’t perfect…",
"But we stayed.",
"We kept going.",
"We trusted.",
"We dreamed.",
"We rested.",
"We grew."
];

function load(){
  document.getElementById("q").innerText = puzzles[i][0];
  document.getElementById("story").innerText = storyText[i];
  document.getElementById("a").value="";
  document.getElementById("feedback").innerText="";
}

function check(){
  let v = document.getElementById("a").value.toLowerCase().trim();

  if(v === puzzles[i][1]){
    letters.push(puzzles[i][2]); // hidden
    i++;

    if(i < puzzles.length){
      load();
    } else {
      finalGame();
    }
  } else {
    document.getElementById("feedback").innerText="Try again ❤️";
  }
}

/* ---------- FINAL GAME ---------- */

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function finalGame(){
  document.getElementById("app").innerHTML = `
    <h2>Final step…</h2>
    <p>Take what you’ve discovered… and put it in order ❤️</p>

    <div id="tiles" class="zone"></div>
    <div id="drop" class="zone">Drop here</div>

    <button onclick="checkFinal()">Unlock</button>
  `;

  let finalLetters = [...letters, "R", "O"];
  finalLetters = shuffle(finalLetters);

  const tilesContainer = document.getElementById("tiles");

  finalLetters.forEach((l, index) => {
    let el = document.createElement("div");
    el.className = "tile";
    el.innerText = l;
    el.id = "tile-" + index;
    el.draggable = true;

    el.ondragstart = (e) => {
      e.dataTransfer.setData("id", el.id);
    };

    tilesContainer.appendChild(el);
  });

  const drop = document.getElementById("drop");

  drop.ondragover = (e) => e.preventDefault();

  drop.ondrop = (e) => {
    e.preventDefault();
    const id = e.dataTransfer.getData("id");
    const el = document.getElementById(id);
    drop.appendChild(el);
  };
}

/* ---------- CHECK FINAL ---------- */

function checkFinal(){
  let result = "";
  document.querySelectorAll("#drop .tile").forEach(el => {
    result += el.innerText;
  });

  if(result.toLowerCase() === "bachaturo"){
    reveal();
  } else {
    alert("Not quite… try again ❤️");
  }
}

/* ---------- FINAL REVEAL ---------- */

function reveal(){
  document.getElementById("app").innerHTML = `
    <h1>💃🕺</h1>
    <h2>You found it ❤️</h2>

    <p>Through everything…</p>
    <p>We found our way again.</p>

    <br>

    <h1>BACHATURO</h1>

    <br>

    <h2>📅 13 August</h2>
    <p>Something beautiful is waiting for us…</p>
  `;
}

load();
</script>

</body>
</html>
