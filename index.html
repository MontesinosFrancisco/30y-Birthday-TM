<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fecfef);
  overflow:hidden;
}

/* Floating background hearts */
.bg-heart {
  position:fixed;
  font-size:18px;
  color:#ff6b81;
  opacity:0.2;
  animation: floatBg 10s linear infinite;
}

@keyframes floatBg {
  from { transform:translateY(100vh); }
  to { transform:translateY(-10vh); }
}

.container {
  width:90%;
  max-width:600px;
  margin: auto;
  margin-top:10vh;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.75);
  backdrop-filter: blur(15px);
  text-align:center;
  box-shadow:0 10px 40px rgba(255,105,135,0.3);
}

h1 { color:#c44569; }

input {
  padding:12px;
  width:70%;
  border:none;
  border-radius:12px;
}

button {
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff6b81;
  color:white;
  margin-top:10px;
}

/* Final puzzle */
.tiles, .slots {
  margin-top:15px;
}

.tile {
  display:inline-block;
  padding:14px 18px;
  margin:6px;
  background:#ff6b81;
  color:white;
  border-radius:12px;
  font-size:20px;
  cursor:pointer;
  transition:0.2s;
}

.tile:hover {
  transform:scale(1.1);
}

.slot {
  display:inline-block;
  width:40px;
  height:50px;
  margin:5px;
  border-bottom:3px solid #ff6b81;
  font-size:22px;
  line-height:50px;
}

.correct {
  color:#ff4d6d;
  animation: pop 0.3s;
}

@keyframes pop {
  0% { transform:scale(0.5); }
  100% { transform:scale(1); }
}

/* Hearts burst */
.heart {
  position:fixed;
  color:#ff4d6d;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
  from { transform:translateY(0); opacity:1; }
  to { transform:translateY(-150px); opacity:0; }
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="container" id="app">
  <h1>For You ❤️</h1>
  <p id="story"></p>

  <p id="q"></p>
  <input id="a">
  <br>
  <button onclick="check()">Continue</button>

  <p id="feedback"></p>
</div>

<script>
/* Floating hearts background */
function createBgHearts(){
  for(let i=0;i<20;i++){
    let h=document.createElement("div");
    h.className="bg-heart";
    h.innerText="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(h);
  }
}
createBgHearts();

/* Hearts burst */
function heartsBurst(){
  for(let i=0;i<15;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.top="60vh";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
  }
}

/* Puzzle */
const puzzles = [
["We stayed even when it was hard. What is that called?","love"],
["A dance you love…","bachata"],
["A dance I love…","salsa"],
["Who do you trust when things are uncertain?","god"],
["Our future dog…","churro"],
["Your favorite hobby 😴","sleeping"],
["The pedagogy thinker you always mention","tulodziecki"]
];

let i=0;

function load(){
  document.getElementById("q").innerText=puzzles[i][0];
  document.getElementById("a").value="";
}

function check(){
  let v=document.getElementById("a").value.toLowerCase().trim();
  if(v===puzzles[i][1]){
    heartsBurst();
    i++;
    if(i<puzzles.length){
      load();
    } else {
      finalGame();
    }
  } else {
    document.getElementById("feedback").innerText="Try again ❤️";
  }
}

/* FINAL GAME (CLICK SYSTEM) */

const correctWord = "BACHATURO";
let currentBuild = [];

function finalGame(){
  document.getElementById("app").innerHTML=`
    <h2>Final step…</h2>
    <p>Tap letters to build the word ❤️</p>

    <div class="slots" id="slots"></div>
    <div class="tiles" id="tiles"></div>

    <button onclick="checkFinal()">Unlock</button>
  `;

  const scrambled = ["R","C","H","B","O","T","A","A","U"];

  /* slots */
  for(let i=0;i<correctWord.length;i++){
    let s=document.createElement("div");
    s.className="slot";
    s.id="slot-"+i;
    document.getElementById("slots").appendChild(s);
  }

  /* tiles */
  scrambled.forEach((l,idx)=>{
    let t=document.createElement("div");
    t.className="tile";
    t.innerText=l;

    t.onclick=()=>{
      if(currentBuild.length<correctWord.length){
        document.getElementById("slot-"+currentBuild.length).innerText=l;
        currentBuild.push(l);
        t.style.visibility="hidden";
      }
    };

    document.getElementById("tiles").appendChild(t);
  });
}

/* CHECK FINAL */

function checkFinal(){
  let result=currentBuild.join("");

  if(result===correctWord){
    heartsBurst();
    highlightCorrect();
    setTimeout(reveal,600);
  } else {
    document.getElementById("feedback").innerText="Almost… ❤️";
  }
}

function highlightCorrect(){
  for(let i=0;i<correctWord.length;i++){
    document.getElementById("slot-"+i).classList.add("correct");
  }
}

/* FINAL REVEAL */

function reveal(){
  document.getElementById("app").innerHTML=`
    <h1>💃🕺</h1>
    <h2>You found it ❤️</h2>

    <p>We chose each other again.</p>

    <h1 style="color:#ff4d6d;">BACHATURO</h1>

    <h2>📅 13 August</h2>
    <p>Something beautiful is waiting for us…</p>
  `;
}

load();
</script>

</body>
</html>
