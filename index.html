<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e1e2f,#3a3a6a);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container {
  width:90%;
  max-width:600px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

input {
  padding:12px;
  width:70%;
  border-radius:10px;
  border:none;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6b81;
  color:white;
  cursor:pointer;
}

#letters {
  margin:15px;
  font-size:22px;
  letter-spacing:8px;
}

.tile {
  display:inline-block;
  padding:15px;
  margin:5px;
  background:#ff6b81;
  border-radius:10px;
  cursor:grab;
}

.dropzone {
  min-height:60px;
  border:2px dashed white;
  margin-top:20px;
  padding:10px;
}

</style>
</head>

<body>

<div class="container" id="app">
  <h1>For You ❤️</h1>
  <p id="story"></p>

  <div id="letters"></div>

  <p id="q"></p>
  <input id="a">
  <button onclick="check()">OK</button>

  <p id="feedback"></p>
</div>

<script>
const puzzles = [
["We stayed even when it was hard. What is that called?","love","B"],
["Your dance","bachata","A"],
["My dance","salsa","C"],
["Who guides us?","god","H"],
["Future dog name","churro","A"],
["Favorite hobby","sleeping","T"],
["Pedagogy thinker","tulodziecki","U"]
];

let i=0;
let letters=[];

function load(){
  document.getElementById("q").innerText=puzzles[i][0];
  document.getElementById("story").innerText=[
    "We weren’t perfect…",
    "But we stayed.",
    "We grow together.",
    "We trust.",
    "We dream.",
    "We rest.",
    "We inspire."
  ][i];
}

function shuffle(array){
  return array.sort(()=>Math.random()-0.5);
}

function check(){
  let v=document.getElementById("a").value.toLowerCase().trim();
  if(v===puzzles[i][1]){
    letters.push(puzzles[i][2]);
    document.getElementById("letters").innerText=shuffle([...letters]).join(" ");
    document.getElementById("a").value="";
    i++;

    if(i<puzzles.length){
      load();
    } else {
      finalGame();
    }
  } else {
    document.getElementById("feedback").innerText="Try again ❤️";
  }
}

function finalGame(){
  document.getElementById("app").innerHTML=`
    <h2>Final step…</h2>
    <p>Put everything in the right order ❤️</p>

    <div id="tiles"></div>
    <div class="dropzone" id="drop"></div>

    <button onclick="checkFinal()">Unlock</button>
  `;

  let finalLetters=[...letters,"R","O"]; // complete word
  finalLetters=shuffle(finalLetters);

  let tilesHTML="";
  finalLetters.forEach((l,i)=>{
    tilesHTML+=`<div class="tile" draggable="true" ondragstart="drag(event)" id="t${i}">${l}</div>`;
  });

  document.getElementById("tiles").innerHTML=tilesHTML;

  const drop=document.getElementById("drop");
  drop.ondragover=(e)=>e.preventDefault();
  drop.ondrop=(e)=>{
    e.preventDefault();
    const id=e.dataTransfer.getData("text");
    const el=document.getElementById(id);
    drop.appendChild(el);
  };
}

function drag(ev){
  ev.dataTransfer.setData("text", ev.target.id);
}

function checkFinal(){
  let result="";
  document.querySelectorAll("#drop .tile").forEach(el=>{
    result+=el.innerText;
  });

  if(result.toLowerCase()==="bachaturo"){
    reveal();
  } else {
    alert("Almost… try again ❤️");
  }
}

function reveal(){
  document.getElementById("app").innerHTML=`
    <h1>💃🕺</h1>
    <h2>You did it ❤️</h2>
    <p>We chose each other again.</p>
    <p>This is just the beginning.</p>
    <br>
    <h1>📅 13 August</h1>
    <p>Something beautiful is waiting for us…</p>
  `;
}

load();
</script>

</body>
</html>
