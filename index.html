<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fecfef);
  color:#5a2a3a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:90%;
  max-width:600px;
  padding:35px;
  border-radius:25px;
  background:rgba(255,255,255,0.7);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(255,105,135,0.3);
  text-align:center;
  animation: fadeIn 1s ease;
}

h1 {
  margin-bottom:10px;
}

#story {
  opacity:0.7;
  margin-bottom:20px;
}

input {
  padding:12px;
  width:70%;
  border-radius:12px;
  border:none;
  outline:none;
  box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
}

button {
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#ff6b81;
  color:white;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s;
}

button:hover {
  transform:scale(1.05);
  background:#ff4d6d;
}

/* Tiles */

.tile {
  display:inline-block;
  padding:14px 18px;
  margin:6px;
  background:#ff6b81;
  color:white;
  border-radius:12px;
  font-size:20px;
  cursor:grab;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  transition:0.2s;
}

.tile:hover {
  transform:scale(1.1);
}

.zone {
  min-height:70px;
  border:2px dashed #ff6b81;
  border-radius:15px;
  margin:15px 0;
  padding:10px;
  background:rgba(255,255,255,0.5);
}

.zone.active {
  background:#ffe3ea;
}

#feedback {
  margin-top:10px;
  color:#c44569;
}

/* Animations */

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container" id="app">
  <h1>For You ❤️</h1>
  <p id="story"></p>

  <p id="q"></p>
  <input id="a" placeholder="Your answer...">
  <br>
  <button onclick="check()">Continue</button>

  <p id="feedback"></p>
</div>

<script>
const puzzles = [
["We stayed even when it was hard. What is that called?","love"],
["A dance you love…","bachata"],
["A dance I love…","salsa"],
["Who do you trust when things are uncertain?","god"],
["Our future dog…","churro"],
["Your favorite hobby 😴","sleeping"],
["The pedagogy thinker you always mention","tulodziecki"]
];

const storyText = [
"We weren’t perfect…",
"But we stayed.",
"We kept going.",
"We trusted.",
"We dreamed.",
"We rested.",
"We grew."
];

let i=0;

function load(){
  document.getElementById("q").innerText = puzzles[i][0];
  document.getElementById("story").innerText = storyText[i];
  document.getElementById("a").value="";
  document.getElementById("feedback").innerText="";
}

function check(){
  let v = document.getElementById("a").value.toLowerCase().trim();

  if(v === puzzles[i][1]){
    i++;
    if(i < puzzles.length){
      load();
    } else {
      finalGame();
    }
  } else {
    document.getElementById("feedback").innerText="Try again ❤️";
  }
}

/* FINAL GAME */

function finalGame(){
  document.getElementById("app").innerHTML = `
    <h2>Final step…</h2>
    <p>Put everything in the right order ❤️</p>

    <div id="tiles" class="zone"></div>
    <div id="drop" class="zone">Drop here</div>

    <button onclick="checkFinal()">Unlock</button>
  `;

  const letters = ["R","C","H","B","O","T","A","A","U"];

  const tilesContainer = document.getElementById("tiles");

  letters.forEach((l, index) => {
    let el = document.createElement("div");
    el.className = "tile";
    el.innerText = l;
    el.id = "tile-" + index;
    el.draggable = true;

    el.ondragstart = (e) => {
      e.dataTransfer.setData("id", el.id);
    };

    tilesContainer.appendChild(el);
  });

  const drop = document.getElementById("drop");

  drop.ondragover = (e) => {
    e.preventDefault();
    drop.classList.add("active");
  };

  drop.ondragleave = () => {
    drop.classList.remove("active");
  };

  drop.ondrop = (e) => {
    e.preventDefault();
    drop.classList.remove("active");

    const id = e.dataTransfer.getData("id");
    const el = document.getElementById(id);
    drop.appendChild(el);
  };
}

/* CHECK FINAL */

function checkFinal(){
  let result = "";
  document.querySelectorAll("#drop .tile").forEach(el => {
    result += el.innerText;
  });

  if(result.toLowerCase() === "bachaturo"){
    reveal();
  } else {
    document.getElementById("feedback").innerText="Almost… try again ❤️";
  }
}

/* FINAL REVEAL */

function reveal(){
  document.getElementById("app").innerHTML = `
    <h1>💃🕺</h1>
    <h2>You found it ❤️</h2>

    <p>Through everything…</p>
    <p>We found our way again.</p>

    <br>

    <h1 style="color:#ff4d6d;">BACHATURO</h1>

    <br>

    <h2>📅 13 August</h2>
    <p>Something beautiful is waiting for us…</p>
  `;
}

load();
</script>

</body>
</html>
