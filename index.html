<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  margin-top: 100px;
}
input, button {
  padding:10px;
  font-size:16px;
}
button {
  background:#ff6b81;
  color:white;
  border:none;
}
</style>
</head>

<body>

<h1>For You ❤️</h1>
<p>Solve everything... get your gift.</p>

<p><b>Progress:</b> <span id="letters"></span></p>

<p id="q"></p>
<input id="a">
<button onclick="c()">OK</button>

<p id="f"></p>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
const P = [
["I move with rhythm. Two hearts. What am I?","dance","B"],
["Where did we first meet?","CHANGE_ME","A"],
["Unscramble: LVOE","love","C"],
["2+2?","4","H"],
["Latin dance we learn?","bachata","A"],
["You make my life ____","beautiful","T"],
["My favorite thing about you?","CHANGE_ME","U"],
["Type the final word","bachaturo","RO"]
];

let i=0, L="";

function load(){
  document.getElementById("q").innerText=P[i][0];
  document.getElementById("a").value="";
  document.getElementById("f").innerText="";
}

function c(){
  let v=document.getElementById("a").value.toLowerCase().trim();
  if(v===P[i][1]){
    L+=P[i][2];
    document.getElementById("letters").innerText=L;
    i++;
    if(i<P.length){load();}
    else{
      document.body.innerHTML=
      "<h1>"+L+" 💃🕺</h1><p>Happy Birthday ❤️</p><p>Gift: BACHATA NIGHT</p>";
    }
  } else {
    document.getElementById("f").innerText="Wrong. Try again.";
  }
}
load();
</script>

</body>
</html>
